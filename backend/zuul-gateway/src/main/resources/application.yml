server:
  port: 8080

spring:
  application:
    name: zuul-gateway
  cloud:
    config:
      uri: http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

zuul:
  routes:
    # 用户服务路由（新增）
    user-service:
      path: /api/user/**
      serviceId: user-service
      stripPrefix: false

    # 音乐服务路由（新增）
    music-service:
      path: /api/music/**
      serviceId: music-service
      stripPrefix: false

    # AI 服务路由
    ai-chat:
      path: /api/music/chat
      serviceId: ai-service
      stripPrefix: false
    ai-greeting:
      path: /api/music/greeting
      serviceId: ai-service
      stripPrefix: false
    ai-genre:
      path: /api/music/genre
      serviceId: ai-service
      stripPrefix: false
    ai-genres-batch:
      path: /api/music/genres/batch
      serviceId: ai-service
      stripPrefix: false
    ai-knowledge:
      path: /api/music/knowledge/**
      serviceId: ai-service
      stripPrefix: false
    ai-service:
      path: /api/ai/**
      serviceId: ai-service
      stripPrefix: false
  host:
    connect-timeout-millis: 60000
    socket-timeout-millis: 60000

ribbon:
  ReadTimeout: 60000
  ConnectTimeout: 60000

hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 250000
